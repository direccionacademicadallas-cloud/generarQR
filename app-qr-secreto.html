<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Secreto</title>
    <!-- QR Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --bg-base: #0f0f0f;
            --bg-panel: #1a1a1a;
            --bg-card: #222;
            --border: #333;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-base);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .container { max-width: 600px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2em; margin: 0; color: #c8e0f0; }
        .header p { color: var(--text-secondary); margin: 8px 0 0; }

        /* TABS */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: var(--bg-panel);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-secondary);
        }

        .tab.active {
            background: #1e3a5f;
            color: #8ab4e8;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* PANEL */
        .panel {
            background: var(--bg-panel);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: border-color 0.3s;
            resize: vertical;
        }

        .form-control:focus {
            outline: none;
            border-color: #2a6496;
            box-shadow: 0 0 0 3px rgba(42,100,150,0.2);
        }

        .clave-wrapper {
            position: relative;
        }

        .clave-wrapper .form-control {
            padding-right: 50px;
        }

        .toggle-clave {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
        }

        /* BOTONES */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-blue {
            background: #1e3a5f;
            color: #8ab4e8;
            border: 1px solid #2a5298;
        }

        .btn-blue:hover { background: #2a4a7f; transform: translateY(-2px); }

        .btn-green {
            background: #1a3d28;
            color: #a0e0b8;
            border: 1px solid #2d8a4e;
        }

        .btn-green:hover { background: #1f4d30; transform: translateY(-2px); }

        .btn-red {
            background: #3a0f0f;
            color: #e08080;
            border: 1px solid #8b2020;
        }

        .btn-red:hover { background: #5a1a1a; }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* QR OUTPUT */
        .qr-output {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .qr-output h3 {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        #qrCanvas {
            background: white;
            padding: 16px;
            border-radius: 12px;
            display: inline-block;
        }

        .btn-descargar {
            margin-top: 15px;
            padding: 10px 24px;
            background: #2a2a2a;
            color: #a0a0a0;
            border: 1px solid #444;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            width: auto;
        }

        .btn-descargar:hover { background: #333; color: var(--text-primary); }

        /* SCANNER */
        #scannerContainer {
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid var(--border);
        }

        #scannerContainer video { border-radius: 10px; }

        /* RESULTADO */
        .resultado {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }

        .resultado.success {
            display: block;
            background: #0d2b18;
            border: 1px solid #2d8a4e;
        }

        .resultado.error {
            display: block;
            background: #2a0f0f;
            border: 1px solid #8b2020;
        }

        .resultado-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .resultado.success .resultado-label { color: #5cb87a; }
        .resultado.error .resultado-label { color: #e08080; }

        .resultado-texto {
            font-size: 18px;
            font-weight: bold;
            word-break: break-word;
        }

        .resultado.success .resultado-texto { color: #a0e8b8; }
        .resultado.error .resultado-texto { color: #f0a0a0; }

        /* STATUS */
        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            display: none;
        }

        .status.ok { display: block; background: #0d2b18; color: #80c898; border: 1px solid #2d8a4e; }
        .status.err { display: block; background: #2a0f0f; color: #e08080; border: 1px solid #8b2020; }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        .info-box {
            background: #1a1a2e;
            border: 1px solid #3a3a6a;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #a0a0d0;
            margin-bottom: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 QR Secreto</h1>
            <p>Genera y escanea códigos QR con mensajes cifrados</p>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" onclick="cambiarTab('generar')">🔒 Generar QR</button>
            <button class="tab" onclick="cambiarTab('escanear')">📷 Escanear QR</button>
        </div>

        <!-- TAB GENERAR -->
        <div id="tab-generar" class="tab-content active">
            <div class="panel">
                <div class="info-box">
                    💡 El mensaje se cifra con tu clave secreta. Solo quien tenga la misma clave podrá leerlo al escanear.
                </div>

                <div class="form-group">
                    <label>Mensaje secreto</label>
                    <textarea class="form-control" id="mensajeInput" rows="3"
                              placeholder="Escribe el mensaje que quieres ocultar..."></textarea>
                </div>

                <div class="form-group">
                    <label>Clave secreta</label>
                    <div class="clave-wrapper">
                        <input type="password" class="form-control" id="claveGenerar"
                               placeholder="Opcional — deja vacío para usar clave interna">
                        <button class="toggle-clave" onclick="toggleClave('claveGenerar')">👁</button>
                    </div>
                </div>

                <button class="btn btn-blue" onclick="generarQR()">🔒 Generar QR Cifrado</button>

                <div class="status" id="statusGenerar"></div>

                <div class="qr-output" id="qrOutput">
                    <h3>Tu QR cifrado</h3>
                    <div id="qrCanvas"></div>
                    <br>
                    <button class="btn-descargar" onclick="descargarQR()">⬇️ Descargar imagen</button>
                </div>
            </div>
        </div>

        <!-- TAB ESCANEAR -->
        <div id="tab-escanear" class="tab-content">
            <div class="panel">
                <div class="info-box">
                    💡 Escanea un QR generado con esta app e ingresa la clave correcta para ver el mensaje.
                </div>

                <div id="scannerContainer"></div>

                <button class="btn btn-green" id="btnEscanear" onclick="iniciarEscaner()">
                    📷 Iniciar Cámara
                </button>
                <button class="btn btn-red" id="btnDetener" onclick="detenerEscaner()" style="display:none; margin-top:8px;">
                    ⏹ Detener
                </button>

                <hr class="divider">

                <div class="form-group">
                    <label>O pega el contenido del QR manualmente</label>
                    <textarea class="form-control" id="qrManual" rows="2"
                              placeholder="Pega aquí el texto del QR..."></textarea>
                </div>

                <div class="form-group">
                    <label>Clave secreta</label>
                    <div class="clave-wrapper">
                        <input type="password" class="form-control" id="claveEscanear"
                               placeholder="Opcional — deja vacío si no se usó clave">
                        <button class="toggle-clave" onclick="toggleClave('claveEscanear')">👁</button>
                    </div>
                </div>

                <button class="btn btn-blue" onclick="descifrarManual()">🔓 Descifrar Mensaje</button>

                <div class="resultado" id="resultado">
                    <div class="resultado-label" id="resultadoLabel"></div>
                    <div class="resultado-texto" id="resultadoTexto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode = null;
        let qrInstance = null;

        // ── TABS ──────────────────────────────────────────────
        function cambiarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
            if (tab !== 'escanear') detenerEscaner();
        }

        const CLAVE_DEFAULT = 'qr-secreto-app-2024';

        // ── CIFRADO AES con Web Crypto API ────────────────────
        async function derivarClave(clave, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw', enc.encode(clave), 'PBKDF2', false, ['deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        async function cifrar(texto, clave) {
            const enc = new TextEncoder();
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv   = crypto.getRandomValues(new Uint8Array(12));
            const key  = await derivarClave(clave, salt);
            const cifrado = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv },
                key,
                enc.encode(texto)
            );
            // Empaquetar: salt(16) + iv(12) + datos
            const resultado = new Uint8Array(16 + 12 + cifrado.byteLength);
            resultado.set(salt, 0);
            resultado.set(iv, 16);
            resultado.set(new Uint8Array(cifrado), 28);
            return btoa(String.fromCharCode(...resultado));
        }

        async function descifrar(base64, clave) {
            const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            const salt    = bytes.slice(0, 16);
            const iv      = bytes.slice(16, 28);
            const datos   = bytes.slice(28);
            const key     = await derivarClave(clave, salt);
            const descifrado = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv },
                key,
                datos
            );
            return new TextDecoder().decode(descifrado);
        }

        // ── GENERAR QR ────────────────────────────────────────
        async function generarQR() {
            const mensaje = document.getElementById('mensajeInput').value.trim();
            const claveInput = document.getElementById('claveGenerar').value.trim();
            const clave = claveInput || CLAVE_DEFAULT;
            const statusEl = document.getElementById('statusGenerar');

            if (!mensaje) return mostrarStatus(statusEl, 'err', '⚠️ Escribe un mensaje');

            try {
                const textoCifrado = await cifrar(mensaje, clave);

                // Limpiar QR anterior
                const canvas = document.getElementById('qrCanvas');
                canvas.innerHTML = '';
                if (qrInstance) { qrInstance.clear(); }

                qrInstance = new QRCode(canvas, {
                    text: textoCifrado,
                    width: 256,
                    height: 256,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });

                document.getElementById('qrOutput').style.display = 'block';
                mostrarStatus(statusEl, 'ok', '✅ QR generado correctamente');
            } catch (e) {
                mostrarStatus(statusEl, 'err', '❌ Error al cifrar el mensaje');
            }
        }

        function descargarQR() {
            const img = document.querySelector('#qrCanvas img');
            if (!img) return;
            const a = document.createElement('a');
            a.href = img.src;
            a.download = 'qr-secreto.png';
            a.click();
        }

        // ── ESCANEAR QR ───────────────────────────────────────
        function iniciarEscaner() {
            document.getElementById('btnEscanear').style.display = 'none';
            document.getElementById('btnDetener').style.display = 'block';

            html5QrCode = new Html5Qrcode('scannerContainer');
            html5QrCode.start(
                { facingMode: 'environment' },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    document.getElementById('qrManual').value = decodedText;
                    detenerEscaner();
                    const claveInput = document.getElementById('claveEscanear').value.trim();
                    const clave = claveInput || CLAVE_DEFAULT;
                    descifrarTexto(decodedText, clave);
                },
                () => {}
            ).catch(() => {
                mostrarResultado('error', '❌ No se pudo acceder a la cámara');
                detenerEscaner();
            });
        }

        function detenerEscaner() {
            if (html5QrCode) {
                html5QrCode.stop().catch(() => {});
                html5QrCode = null;
            }
            document.getElementById('btnEscanear').style.display = 'block';
            document.getElementById('btnDetener').style.display = 'none';
        }

        function descifrarManual() {
            const texto = document.getElementById('qrManual').value.trim();
            const claveInput = document.getElementById('claveEscanear').value.trim();
            const clave = claveInput || CLAVE_DEFAULT;
            if (!texto) return mostrarResultado('error', '⚠️ Pega el contenido del QR');
            descifrarTexto(texto, clave);
        }

        async function descifrarTexto(textoCifrado, clave) {
            try {
                const mensaje = await descifrar(textoCifrado, clave);
                mostrarResultado('success', mensaje);
            } catch {
                mostrarResultado('error', '🔑 Clave incorrecta o QR no válido');
            }
        }

        // ── HELPERS ───────────────────────────────────────────
        function mostrarResultado(tipo, texto) {
            const el = document.getElementById('resultado');
            const label = document.getElementById('resultadoLabel');
            const textoEl = document.getElementById('resultadoTexto');
            el.className = `resultado ${tipo}`;
            label.textContent = tipo === 'success' ? '✅ Mensaje descifrado' : '❌ Error';
            textoEl.textContent = texto;
        }

        function mostrarStatus(el, tipo, msg) {
            el.className = `status ${tipo}`;
            el.textContent = msg;
        }

        function toggleClave(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
